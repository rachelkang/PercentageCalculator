name: Release Native Binaries

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Publish Windows
        run: dotnet publish PercentageCalculator/PercentageCalculator.csproj -c Release -f net10.0-windows10.0.19041.0 -o output/windows

      - name: Zip Windows build
        run: Compress-Archive -Path output/windows/* -DestinationPath PercentageCalculator-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: PercentageCalculator-windows.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Publish Android
        run: dotnet publish PercentageCalculator/PercentageCalculator.csproj -c Release -f net10.0-android -o output/android

      - name: Find APK
        id: find-apk
        run: |
          APK=$(find output/android -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-build
          path: ${{ steps.find-apk.outputs.apk_path }}

  create-release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-build

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            PercentageCalculator-windows.zip
            *.apk
